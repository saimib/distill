<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distill – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .logo span {
      opacity: 0.6;
      font-weight: 400;
    }

    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #f1f1f1;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input:focus, select:focus {
      border-color: rgba(255,255,255,0.4);
    }

    select option {
      background: #1a1a1a;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .row input {
      margin-bottom: 0;
      flex: 1;
    }

    .toggle-key {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: #aaa;
      border-radius: 6px;
      padding: 9px 10px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .toggle-key:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    button.save {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    button.save:hover { opacity: 0.88; }

    .status {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: #4caf50;
    }

    .status.err { color: #ff6b6b; }

    .hint {
      font-size: 11.5px;
      color: #666;
      margin-top: -12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    a { color: #6ea8fe; }
  </style>
</head>
<body>
  <header>
    <div class="logo">✦ Distill <span>for YouTube</span></div>
  </header>

  <label for="api-key">Gemini API Key</label>
  <div class="row">
    <input type="password" id="api-key" placeholder="AIza…" autocomplete="off" spellcheck="false">
    <button class="toggle-key" id="toggle-key" title="Show/hide key">Show</button>
  </div>
  <p class="hint">
    Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a> — no credit card required.
  </p>

  <label for="model">Model</label>
  <select id="model">
    <option value="gemini-2.5-flash">gemini-2.5-flash (recommended)</option>
    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
    <option value="gemini-1.5-flash">gemini-1.5-flash</option>
    <option value="gemini-1.5-pro">gemini-1.5-pro</option>
  </select>

  <button class="save" id="save">Save settings</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
